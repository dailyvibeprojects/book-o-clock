<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book o'clock!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d1a;
    --panel:     #1a1a2e;
    --border:    #4a4a8a;
    --accent:    #f7d94c;
    --accent2:   #ff6b6b;
    --accent3:   #6bffb8;
    --text:      #e8e8ff;
    --dim:       #7070aa;
    --book1:     #ff6b6b;
    --book2:     #f7d94c;
    --book3:     #6bffb8;
    --book4:     #b06bff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  body {
    font-family: 'Press Start 2P', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 40px;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 5%,  #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 8%,  #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 40%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 50%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 35%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  70%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 75%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 90%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 88%, #fff 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  body > * { position: relative; z-index: 1; }

  /* ── Title ── */
  .title-wrap {
    text-align: center;
    margin-bottom: 18px;
  }

  h1 {
    font-size: clamp(14px, 4vw, 22px);
    color: var(--accent);
    text-shadow: 3px 3px 0 #7a6000;
    letter-spacing: 2px;
    line-height: 1.5;
  }
  h1 span { color: var(--accent2); text-shadow: 3px 3px 0 #800000; }

  /* ── Pixel panel ── */
  .pixel-panel {
    background: var(--panel);
    border: 4px solid var(--border);
    box-shadow: 4px 4px 0 #000, inset 0 0 0 2px #2a2a4e;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  /* ── Clock ── */
  .clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  canvas#clockCanvas {
    display: block;
    width: 320px;
    height: 320px;
  }

  /* ── Compact settings bar ── */
  .settings-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
    max-width: 480px;
    margin-top: 4px;
    padding: 10px 14px;
    background: var(--panel);
    border: 4px solid var(--border);
    box-shadow: 4px 4px 0 #000;
  }

  .settings-bar label {
    font-size: 6px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .settings-bar input[type="time"],
  .settings-bar input[type="number"] {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: #0a0a18;
    border: 2px solid var(--border);
    color: var(--accent);
    padding: 5px 5px;
    width: auto;
    outline: none;
    box-shadow: inset 2px 2px 0 #000;
  }
  .settings-bar input[type="number"] { width: 48px; }
  .settings-bar input:focus { border-color: var(--accent); }
  .settings-bar input[type="number"]::-webkit-inner-spin-button { display: none; }

  /* ── Books counter ── */
  .books-panel {
    text-align: center;
  }

  .section-label {
    font-size: 7px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .books-count-big {
    font-size: clamp(20px, 5vw, 28px);
    color: var(--accent);
    text-shadow: 3px 3px 0 #7a6000;
    line-height: 1;
    margin-bottom: 6px;
    animation: countPop .25s ease-out;
  }
  @keyframes countPop {
    0%   { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .books-unit {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 18px;
  }

  /* Pixel book icons */
  .books-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    min-height: 52px;
    align-items: center;
  }

  .book-icon {
    width: 28px;
    height: 36px;
    position: relative;
    flex-shrink: 0;
    animation: bookBounce .4s ease-out both;
  }
  @keyframes bookBounce {
    0%   { transform: translateY(20px) scale(0.5); opacity:0; }
    60%  { transform: translateY(-6px) scale(1.1); opacity:1; }
    100% { transform: translateY(0) scale(1); opacity:1; }
  }

  /* book drawn with box-shadow trick in a pseudo */
  .book-icon svg { width: 100%; height: 100%; }



  /* ── Scanlines overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.08) 0px, rgba(0,0,0,.08) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 999;
  }

  dvp-footer {
    margin-top: auto;
  }

</style>
</head>
<body>

<div class="title-wrap">
  <h1>Book o'clock</h1>
</div>

<!-- Clock -->
<canvas id="clockCanvas" width="320" height="320" style="display:block;width:320px;height:320px;margin:0 auto 16px;"></canvas>

<!-- Books counter -->
<div class="pixel-panel books-panel">
  <div class="books-count-big" id="booksCount">–</div>
  <div class="books-unit" id="booksUnit">books before bedtime</div>
  <div class="books-row" id="booksRow"></div>

</div>

<!-- Compact settings strip -->
<div class="settings-bar">
  <label>🌙 Bed time <input type="time" id="bedTime" value="21:00"></label>
  <label>📖 Mins/book <input type="number" id="bookMins" value="10" min="1" max="120"></label>
</div>

<script>
/* ─── Constants ─── */
const BOOK_COLORS = ['#ff6b6b','#f7d94c','#6bffb8','#b06bff','#ff9f43','#48dbfb'];
const MAX_BOOK_ICONS = Infinity;

/* ─── Canvas clock ─── */
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');

function drawClock(now) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const faceR = 118;

  // ── Frame: purple fill ring + inner black ring ──
  ctx.beginPath();
  ctx.arc(cx, cy, faceR + 6, 0, Math.PI * 2);
  ctx.fillStyle = '#4a4a8a';
  ctx.fill();


  // ── Clock face — dark ──
  ctx.beginPath();
  ctx.arc(cx, cy, faceR, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();

  // ── Tick marks — site dim colour ──
  for (let i = 0; i < 60; i++) {
    const a     = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const major = i % 5 === 0;
    ctx.strokeStyle = major ? '#7070aa' : '#3a3a6a';
    ctx.lineWidth   = major ? 3 : 1.5;
    ctx.lineCap     = 'square';
    const r1 = faceR - 1;
    const r2 = major ? faceR - 14 : faceR - 7;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.stroke();
  }

  // ── Hour numbers — colourful with glow ──
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 14px "Press Start 2P", monospace';
  const numR = faceR - 28;
  const numColors   = ['#ff6b6b','#ff9f43','#f7d94c','#6bffb8','#48dbfb','#54a0ff','#b06bff','#ff6b6b','#ff9f43','#f7d94c','#6bffb8','#48dbfb'];
  const shadowColors= ['#880000','#7a4000','#7a6000','#005522','#003366','#002266','#330066','#880000','#7a4000','#7a6000','#005522','#003366'];
  for (let i = 1; i <= 12; i++) {
    const a   = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const nx  = cx + Math.cos(a) * numR;
    const ny  = cy + Math.sin(a) * numR;
    const col = numColors[i - 1];
    // glow halo
    ctx.save();
    ctx.shadowColor = col;
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = col;
    ctx.fillText(String(i), nx, ny);
    ctx.restore();
    // pixel shadow
    ctx.fillStyle = shadowColors[i - 1];
    ctx.fillText(String(i), nx + 3, ny + 3);
    // main colour on top
    ctx.fillStyle = col;
    ctx.fillText(String(i), nx, ny);
  }

  // ── Hands ──
  const sec = now.getSeconds() + now.getMilliseconds() / 1000;
  const min = now.getMinutes() + sec / 60;
  const hr  = (now.getHours() % 12) + min / 60;

  drawHand(cx, cy, (hr  / 12) * Math.PI * 2, faceR * 0.50, 5,   '#e8e8ff', '#8888ff');
  drawHand(cx, cy, (min / 60) * Math.PI * 2, faceR * 0.76, 3,   '#e8e8ff', '#8888ff');
  drawHand(cx, cy, (sec / 60) * Math.PI * 2, faceR * 0.85, 1.5, '#ff6b6b', '#ff6b6b');

  // Centre pivot
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#4a4a8a'; ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#e8e8ff'; ctx.fill();
}

function drawHand(cx, cy, angle, length, width, color, glowColor) {
  const a = angle - Math.PI/2;
  const ex = cx + Math.cos(a) * length;
  const ey = cy + Math.sin(a) * length;

  // dark shadow offset
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = width + 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + 2, cy + 2);
  ctx.lineTo(ex + 2, ey + 2);
  ctx.stroke();

  // glow pass
  ctx.save();
  ctx.shadowColor = glowColor;
  ctx.shadowBlur  = 12;
  ctx.strokeStyle = color;
  ctx.lineWidth   = width;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.restore();

  // crisp colour on top
  ctx.strokeStyle = color;
  ctx.lineWidth   = width;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
}

/* ─── Book SVG ─── */
function makeBookSVG(color, idx) {
  const delay = (idx * 80);
  const spine = shadeColor(color, -30);
  return `<svg viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg" style="animation-delay:${delay}ms">
    <!-- shadow -->
    <rect x="5" y="4" width="22" height="30" rx="0" fill="#0003"/>
    <!-- cover -->
    <rect x="3" y="2" width="22" height="30" fill="${color}"/>
    <!-- spine -->
    <rect x="3" y="2" width="5" height="30" fill="${spine}"/>
    <!-- pages -->
    <rect x="25" y="4" width="2" height="26" fill="#e8e8cc"/>
    <!-- lines on cover -->
    <rect x="10" y="9"  width="12" height="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="10" y="14" width="9"  height="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="10" y="19" width="11" height="2" fill="rgba(255,255,255,0.25)"/>
    <!-- pixel highlight corner -->
    <rect x="3"  y="2" width="3" height="2" fill="rgba(255,255,255,0.5)"/>
  </svg>`;
}

function shadeColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (num>>16) + amount));
  const g = Math.max(0, Math.min(255, ((num>>8)&0xff) + amount));
  const b = Math.max(0, Math.min(255, (num&0xff) + amount));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

/* ─── Main update ─── */
let lastBooks = -1;

function update() {
  const now = new Date();
  drawClock(now);

  // Bed time
  const bedVal = document.getElementById('bedTime').value;
  const bookMins = parseInt(document.getElementById('bookMins').value) || 10;

  let minsLeft = null;

  if (bedVal) {
    const [bh, bm] = bedVal.split(':').map(Number);
    const bedTotalMins = bh*60 + bm;
    const nowTotalMins = now.getHours()*60 + now.getMinutes();
    let diff = bedTotalMins - nowTotalMins;
    if (diff < -12*60) diff += 24*60;
    minsLeft = diff;
  }

  const booksCount = document.getElementById('booksCount');
  const booksUnit  = document.getElementById('booksUnit');
  const booksRow   = document.getElementById('booksRow');

  if (minsLeft === null) {
    booksCount.textContent = '–';
    booksRow.innerHTML = '';
  } else {

  // Count books
  const books = minsLeft <= 0 ? 0 : Math.floor(minsLeft / bookMins);

  if (books !== lastBooks) {
    lastBooks = books;
    // animate count
    booksCount.style.animation = 'none';
    void booksCount.offsetWidth;
    booksCount.style.animation = 'countPop .25s ease-out';
    booksCount.textContent = books;
    booksUnit.textContent = books === 1 ? 'book before bedtime' : 'books before bedtime';

    // Draw book icons
    booksRow.innerHTML = '';
    const show = Math.min(books, MAX_BOOK_ICONS);
    for (let i=0; i<show; i++) {
      const div = document.createElement('div');
      div.className = 'book-icon';
      div.style.animationDelay = (i*60)+'ms';
      const color = BOOK_COLORS[i % BOOK_COLORS.length];
      div.innerHTML = makeBookSVG(color, i);
      booksRow.appendChild(div);
    }
  }

  } // end minsLeft check

  requestAnimationFrame(update);
}

document.getElementById('bedTime').addEventListener('change', () => { lastBooks = -1; });
document.getElementById('bookMins').addEventListener('input', () => { lastBooks = -1; });

requestAnimationFrame(update);
</script>

<script src="https://dailyvibeprojects.github.io/dvp-footer.js"></script>
<dvp-footer></dvp-footer>
</body>
</html>
